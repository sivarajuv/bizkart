server.port=8080
spring.application.name=kiranakart

# PostgreSQL Database - AWS RDS
# Keep global-bundle.pem available relative to the backend working directory when using the default RDS URL below.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://awsbizkart.c3066o4say7a.ap-south-1.rds.amazonaws.com:5432/bizkart}
#awsbizkart.c3066o4say7a.ap-south-1.rds.amazonaws.com
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
# Localhost fallback example
#spring.datasource.url=jdbc:postgresql://localhost:5434/bizkart
#spring.datasource.username=postgres
#spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Claude API — set via CLAUDE_API_KEY env var, never commit a real key here.
claude.api.key={CLAUDE_API_KEY:}
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-20250514

# JWT Security — set via JWT_SECRET env var in every real deployment. The
# fallback below is only for convenience running on localhost and must never
# be relied on outside your own machine.
jwt.secret=${JWT_SECRET:KiranaKart2024SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000

# ── WhatsApp Notifications ──────────────────────────────────────────────────
# Set to true and provide phone to enable notifications
whatsapp.enabled=true
# 10-digit Indian number (without +91)
whatsapp.shop.phone=7259000552
# Optional: BSP API (WATI, 360dialog etc.) - leave blank to use wa.me links only
whatsapp.api.url=
whatsapp.api.token=
